<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajid Tech Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f2f5;
        }
        .neu-flat {
            background: #e0e5ec;
            box-shadow: 9px 9px 16px #a3b1c6,
                       -9px -9px 16px #ffffff;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .neu-pressed {
            background: #e0e5ec;
            box-shadow: inset 6px 6px 10px #a3b1c6,
                       inset -6px -6px 10px #ffffff;
            border: none;
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto neu-flat p-8 md:p-10 rounded-3xl">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Admin Panel - Contact Messages</h1>
        <div id="authSection" class="text-center mb-8">
            <input type="email" id="adminEmail" placeholder="Admin Email" class="neu-pressed w-full md:w-auto px-4 py-2 rounded-xl text-gray-700 mb-4 md:mb-0 md:mr-4 focus:outline-none">
            <input type="password" id="adminPassword" placeholder="Password" class="neu-pressed w-full md:w-auto px-4 py-2 rounded-xl text-gray-700 mb-4 md:mb-0 md:mr-4 focus:outline-none">
            <button id="loginBtn" class="neu-flat px-6 py-2 rounded-full text-purple-600 font-bold hover:text-purple-700 active:scale-95 transition-transform">Login</button>
            <p id="authError" class="text-red-500 mt-2 hidden">Invalid credentials. Please try again.</p>
        </div>

        <div id="messagesSection" class="hidden">
            <h2 class="text-2xl font-semibold text-gray-700 mb-4">Received Messages</h2>
            <button id="logoutBtn" class="neu-flat px-6 py-2 rounded-full text-red-600 font-bold hover:text-red-700 active:scale-95 transition-transform mb-4 float-right">Logout</button>
            <div id="messagesList" class="space-y-4 clear-both">
                <!-- Messages will be loaded here -->
                <p class="text-gray-500 text-center py-8" id="loadingText">Loading messages...</p>
                <p class="text-gray-500 text-center py-8 hidden" id="noMessagesText">No messages received yet.</p>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase configuration will be added here
        // You'll need to copy your firebaseConfig object from index.html
        const firebaseConfig = {
            apiKey: "AIzaSyACoeRx2OI5iUMqTfN6JxAKvF2W60ryZZI",
            authDomain: "sajid-tech.firebaseapp.com",
            projectId: "sajid-tech",
            storageBucket: "sajid-tech.firebasestorage.app",
            messagingSenderId: "20807384664",
            appId: "1:20807384664:web:89062abbb525ef5f89142d",
            measurementId: "G-38Q9055HL8"
        };

        // Initialize Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // DOM Elements
        const authSection = document.getElementById('authSection');
        const messagesSection = document.getElementById('messagesSection');
        const adminEmailInput = document.getElementById('adminEmail');
        const adminPasswordInput = document.getElementById('adminPassword');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const authError = document.getElementById('authError');
        const messagesList = document.getElementById('messagesList');
        const loadingText = document.getElementById('loadingText');
        const noMessagesText = document.getElementById('noMessagesText');

        // Authentication State Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSection.classList.add('hidden');
                messagesSection.classList.remove('hidden');
                loadMessages();
            } else {
                authSection.classList.remove('hidden');
                messagesSection.classList.add('hidden');
                messagesList.innerHTML = ''; // Clear messages when logged out
                loadingText.classList.remove('hidden');
                noMessagesText.classList.add('hidden');
            }
        });

        // Login Functionality
        loginBtn.addEventListener('click', async () => {
            const email = adminEmailInput.value;
            const password = adminPasswordInput.value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                authError.classList.add('hidden');
            } catch (error) {
                console.error("Login Error: ", error.message);
                authError.classList.remove('hidden');
            }
        });

        // Logout Functionality
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error("Logout Error: ", error.message);
            }
        });

        // Load Messages Function
        function loadMessages() {
            loadingText.classList.remove('hidden');
            noMessagesText.classList.add('hidden');
            messagesList.innerHTML = ''; // Clear existing messages

            const q = query(collection(db, "contactSubmissions"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    noMessagesText.classList.remove('hidden');
                    loadingText.classList.add('hidden');
                    return;
                }

                messagesList.innerHTML = ''; // Clear before re-rendering
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const messageElement = document.createElement('div');
                    messageElement.className = 'neu-flat p-6 rounded-xl';
                    messageElement.innerHTML = `
                        <p class="text-gray-800 font-semibold">Name: ${data.name || 'N/A'}</p>
                        <p class="text-gray-700">WhatsApp: ${data.whatsapp || 'N/A'}</p>
                        <p class="text-gray-700">Website: ${data.website ? `<a href="${data.website}" target="_blank" class="text-purple-600 hover:underline">${data.website}</a>` : 'N/A'}</p>
                        <p class="text-gray-700 mt-2"><strong>Message:</strong> ${data.message || 'N/A'}</p>
                        <p class="text-gray-500 text-sm mt-4">Received: ${data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : 'N/A'}</p>
                    `;
                    messagesList.appendChild(messageElement);
                });
                loadingText.classList.add('hidden');
            }, (error) => {
                console.error("Error fetching messages: ", error);
                loadingText.textContent = "Error loading messages.";
            });
        }
    </script>
</body>
</html>
